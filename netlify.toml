# Netlify configuration for multi-page setup

# Clean URL redirects for pages
[[redirects]]
from = "/shop"
to = "/shop/"
status = 301

[[redirects]]
from = "/services"
to = "/services/"
status = 301

[[redirects]]
from = "/policies"
to = "/policies/"
status = 301

# Only redirect actual 404 pages to home, not files
[[redirects]]
from = "/404"
to = "/index.html"
status = 404